<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZooPassport - Digitális Kalandnapló</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen text-slate-800 flex flex-col items-center p-0 m-0">
    <div
      class="w-full max-w-md min-h-screen bg-stone-50 shadow-2xl flex flex-col relative overflow-hidden pb-12"
    >
      <header
        class="bg-[#2d5a3a] text-stone-100 p-5 pt-7 pb-6 rounded-b-[2.5rem] shadow-lg sticky top-0 z-40 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div class="bg-amber-400 p-2.5 rounded-2xl text-slate-900 shadow-md">
            <i class="fa-solid fa-passport text-xl"></i>
          </div>
          <div>
            <h1 class="heading-font text-xl font-bold tracking-wide">
              ZooPassport
            </h1>
            <p class="text-xs text-stone-300 font-medium">
              Vadvilági Kalandnapló
            </p>
          </div>
        </div>
        <button
          id="backToMenuBtn"
          class="hidden bg-emerald-800/50 hover:bg-emerald-800 px-3 py-1.5 rounded-xl text-xs font-semibold transition flex items-center gap-1"
        >
          <i class="fa-solid fa-chevron-left"></i> Főmenü
        </button>
      </header>

      <main id="menuView" class="p-5 flex-1 flex flex-col gap-6">
        <div class="my-2">
          <h2 class="heading-font text-2xl font-bold text-slate-800 mb-1">
            Pecsétkönyveid
          </h2>
          <p class="text-sm text-slate-500">
            Válassz egy helyszínt a kaland megkezdéséhez!
          </p>
        </div>

        <div class="flex flex-col gap-4">
          <div
            onclick="openPassport('nyiregyhaza')"
            class="group relative bg-cover bg-center h-48 rounded-3xl overflow-hidden shadow-md cursor-pointer transform active:scale-[0.98] transition-all duration-300"
            style="
              background-image:
                linear-gradient(
                  to top,
                  rgba(0, 0, 0, 0.85),
                  rgba(0, 0, 0, 0.2)
                ),
                url(./covers/nyiregyhaza_background.avif);
            "
          >
            <div
              class="absolute top-3 right-3 bg-amber-400 text-slate-950 font-bold text-[10px] px-2.5 py-1 rounded-full uppercase tracking-wider shadow"
            >
              Aktív füzet
            </div>
            <div
              class="absolute bottom-0 left-0 right-0 p-5 text-white flex flex-col gap-1"
            >
              <h3
                class="heading-font text-xl font-bold group-hover:text-amber-300 transition-colors"
              >
                Nyíregyházi Állatpark
              </h3>
              <p class="text-xs text-stone-300 flex items-center gap-1">
                <i class="fa-solid fa-map-pin text-amber-400"></i> Sóstó Zoo • 6
                Régió
              </p>
              <div class="mt-3">
                <div
                  class="flex justify-between text-[11px] mb-1 text-stone-300 font-medium"
                >
                  <span>Haladás</span>
                  <span id="globalProgressTxt">0%</span>
                </div>
                <div
                  class="w-full bg-stone-700/60 h-2 rounded-full overflow-hidden"
                >
                  <div
                    id="globalProgressBar"
                    class="bg-gradient-to-r from-amber-400 to-emerald-400 h-full rounded-full transition-all duration-500"
                    style="width: 0%"
                  ></div>
                </div>
              </div>
            </div>
          </div>

          <div
            class="relative bg-cover bg-center h-36 rounded-3xl overflow-hidden shadow-md opacity-60 grayscale filter"
            style="
              background-image:
                linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.3)),
                url(./covers/fovarosi_background.png);
            "
          >
            <div
              class="absolute inset-0 bg-slate-950/40 flex flex-col items-center justify-center text-white"
            >
              <i class="fa-solid fa-lock text-2xl text-amber-400 mb-2"></i>
              <p class="heading-font font-bold text-lg">
                Fővárosi Állat- és Növénykert
              </p>
              <p class="text-xs text-stone-300">Hamarosan elérhető</p>
            </div>
          </div>

          <div
            class="relative bg-cover bg-center h-36 rounded-3xl overflow-hidden shadow-md opacity-60 grayscale filter"
            style="
              background-image:
                linear-gradient(to top, rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.3)),
                url(./covers/veszpremi_background.jpg);
            "
          >
            <div
              class="absolute inset-0 bg-slate-950/40 flex flex-col items-center justify-center text-white"
            >
              <i class="fa-solid fa-lock text-2xl text-amber-400 mb-2"></i>
              <p class="heading-font font-bold text-lg">Veszprémi Állatkert</p>
              <p class="text-xs text-stone-300">Hamarosan elérhető</p>
            </div>
          </div>
        </div>
      </main>

      <main id="passportView" class="hidden p-4 flex-1 flex flex-col gap-4">
        <div
          id="regionTabs"
          class="flex gap-2 overflow-x-auto pb-2 px-1 custom-scrollbar snap-x"
        ></div>

        <div id="activePageContainer" class="flex-1 flex flex-col gap-4"></div>
      </main>

      <!-- <a href="https://www.flaticon.com/free-icons/wolf" title="wolf icons">Wolf icons created by Magnific - Flaticon</a> -->
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
